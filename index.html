<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yoo!</title>

  <!-- SEO & Social Meta -->
  <meta name="description" content="Gibran's personal digital bio and portfolio.">
  <meta name="author" content="Gibran">
  <meta property="og:title" content="Bran | Digital Bio">
  <meta property="og:description" content="Personal space of a lost guy in the digital world.">
  <meta property="og:image" content="pfp.png">

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">
  <link rel="icon" type="image/png" href="fav.png">

  <!-- Content Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Ambient Background -->
  <video autoplay loop muted playsinline class="bg-video">
    <source src="motion7.mp4" type="video/mp4">
  </video>

  <!-- Interactive Overlays -->
  <section id="entry-screen" onclick="enterSite()" aria-label="Enter site">
    <p class="pulse-text">touch!</p>
  </section>

  <section id="hello-screen" class="transition-screen" style="display: none;">
    <h1 class="hello-text">hello</h1>
  </section>

  <section id="response-screen" class="transition-screen" style="display: none;">
    <div class="res-content">
      <h2 class="res-question">how are you today?</h2>
      <div class="res-options">
        <button class="res-btn" onclick="selectResponse('fine')" aria-label="I am doing good">very good!</button>
        <button class="res-btn" onclick="selectResponse('bad')" aria-label="I am doing bad">very bad..</button>
      </div>
    </div>
  </section>

  <!-- Cinematic Transition Scenes -->
  <section id="now-playing-screen" class="transition-screen" style="display: none;">
    <div class="np-content">
      <p class="np-label">PLAYING :</p>
      <div class="np-disc-wrapper">
        <img src="" id="np-disc" class="np-disc-big" alt="Album Disc">
        <div class="np-disc-hole"></div>
      </div>
      <div class="np-info">
        <h2 id="np-title" class="np-title"></h2>
        <p id="np-artist" class="np-artist"></p>
      </div>
      <div class="np-progress-bar">
        <div class="np-progress-inner"></div>
      </div>
    </div>
  </section>

  <section id="connected-screen" class="transition-screen" style="display: none;">
    <div class="nc-content">
      <h1 class="nc-text">you're connected</h1>
      <div class="nc-checkmark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
          stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
    </div>
  </section>

  <section id="welcome-screen" class="transition-screen" style="display: none;">
    <div class="vw-content">
      <h1 class="vw-text">welcome!</h1>
    </div>
  </section>

  <!-- Visual Feedback -->
  <div id="flash-overlay"></div>
  <div id="zen-hold-indicator">
    <svg viewBox="0 0 100 100">
      <circle class="bg" cx="50" cy="50" r="45"></circle>
      <circle class="progress" cx="50" cy="50" r="45"></circle>
    </svg>
    <span class="zen-text">ZEN</span>
  </div>

  <!-- Main Dashboard -->
  <main class="container" id="main-container" style="display: none;">

    <!-- Left Side: Profile Info -->
    <header class="profile-column">
      <div class="profile-wrapper">
        <div class="pulse-ring"></div>

        <!-- 3D Flip Profile -->
        <div class="profile-flip-container" id="profile-card">
          <div class="profile-flip-inner">
            <!-- Front Face -->
            <div class="profile-flip-front">
              <img src="pfp.png" alt="Gibran - Front Profile" class="profile-img">
            </div>
            <!-- Back Face -->
            <div class="profile-flip-back">
              <img src="pfp2.png" alt="Gibran - Alternate Profile" class="profile-img">
            </div>
          </div>
        </div>
      </div>

      <div class="header-text">
        <div class="name-wrapper">
          <h1 class="name">Gibran</h1>
        </div>
        <p class="bio">verloren guy</p>
        <div class="tags-container">
          <span class="tag"># gamer</span>
          <span class="tag"># design</span>
          <span class="tag"># code</span>
          <span class="tag"># skill_issue</span>
          <span class="tag"># noob</span>
        </div>
        <div class="card-quote-container">
          <span class="quote-text"></span>
        </div>
      </div>
    </header>

    <div class="divider"></div>

    <!-- Right Side: Links Navigation -->
    <nav class="links-column">
        <!-- Links are rendered dynamically by js/links.js -->
        <div class="links-container">
          <a href="javascript:void(0)" class="link-card games-link-card" onclick="openGames()">
            <div class="link-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="6" width="20" height="12" rx="2"></rect>
                <path d="M6 12h4"></path>
                <path d="M8 10v4"></path>
                <circle cx="15" cy="11" r="1"></circle>
                <circle cx="18" cy="13" r="1"></circle>
              </svg>
            </div>
            <span class="link-text">Mini Games</span>
          </a>
        </div>
    </nav>
  </main>

  <!-- Audio Resources -->
  <aside class="audio-assets">
    <audio id="impact-sound" src="sound_effect/flash.mp3" preload="auto"></audio>
    <audio id="ding-sound" src="sound_effect/ding.mp3" preload="auto"></audio>
    <audio id="hello-voice" src="voice/Hello.mp3" preload="auto"></audio>
    <audio id="ready-voice-2" src="voice/howareyoutoday.mp3" preload="auto"></audio>
    <audio id="welcome-voice" src="voice/welcome!.mp3" preload="auto"></audio>

    <!-- Response Audio Groups -->
    <div class="good-voices">
      <audio id="good-voice-1" src="good/good1.mp3" preload="auto"></audio>
      <audio id="good-voice-2" src="good/good2.mp3" preload="auto"></audio>
      <audio id="good-voice-3" src="good/good3.mp3" preload="auto"></audio>
    </div>
    <div class="bad-voices">
      <audio id="bad-voice-1" src="bad/bad1.mp3" preload="auto"></audio>
      <audio id="bad-voice-2" src="bad/bad2.mp3" preload="auto"></audio>
      <audio id="bad-voice-3" src="bad/bad3.mp3" preload="auto"></audio>
    </div>
  </aside>

  <!-- Lightbox Overlay -->
  <div id="lightbox" class="lightbox" onclick="toggleZoom(null)">
    <img src="agib.png" class="lightbox-img" id="lightbox-img" alt="Enlarged profile view">
  </div>

  <!-- Perspective Music Player -->
  <div class="music-player" id="music-player" style="display: none;">
    <div class="player-content">
      <div class="album-art-wrapper">
        <img src="disk.png" alt="Album Art" id="album-art" class="album-art">
        <div class="album-hole"></div>
      </div>
      <div class="song-info">
        <p class="song-title"><span>Nama Lagu</span></p>
        <p class="song-artist">Nama Artis</p>
      </div>
      <div class="player-controls">
        <button class="control-btn" onclick="prevSong()" aria-label="Previous Song">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
          </svg>
        </button>
        <button id="play-btn" class="play-btn" onclick="togglePlay()" aria-label="Play/Pause">
          <svg id="play-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z" />
          </svg>
          <svg id="pause-icon" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
          </svg>
        </button>
        <button class="control-btn" onclick="nextSong()" aria-label="Next Song">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Progress Control -->
    <div class="progress-container">
      <span id="current-time">0:00</span>
      <input type="range" id="progress-bar" class="progress-bar" value="0" step="0.1" oninput="seekAudio()"
        aria-label="Seek progress">
      <span id="total-time">0:00</span>
    </div>

    <audio id="bg-music" onended="nextSong()" ontimeupdate="updateProgress()" onloadedmetadata="setMetadata()">
      <source src="" type="audio/mpeg">
    </audio>
  </div>

  <!-- Link Card Hover Preview -->
  <div id="link-preview" class="link-preview">
    <img src="" id="preview-img" alt="Hover preview">
  </div>

  <!-- Footer & Status Controls -->
  <footer id="bottom-right-controls" class="bottom-right-controls" style="display: none;">
    <!-- Desktop quote element (aligned via flexbox) -->
    <span class="quote-text footer-quote desktop-quote"></span>
  </footer>

  <!-- Dedicated quote element for Mobile Zen Mode (bypasses footer animation bounds) -->
  <span class="quote-text footer-quote mobile-zen-quote" style="display: none;"></span>

  <!-- Mini Games Overlay -->
  <div id="games-overlay" class="games-overlay" style="display: none;">
    <div class="games-container">
      <header class="games-header">
        <h2>Mini Games</h2>
        <button class="close-games" onclick="closeGames()">&times;</button>
      </header>

      <nav class="games-tabs">
        <button class="tab-btn active" onclick="switchGame('tictactoe')">Tic Tac Toe</button>
        <button class="tab-btn" onclick="switchGame('snake')">Snake</button>
        <button class="tab-btn" onclick="switchGame('chess')">Chess</button>
      </nav>

      <div class="game-viewport">
        <!-- Tic Tac Toe -->
        <div id="game-tictactoe" class="game-content active">
          <div class="ttt-board" id="ttt-board">
            <div class="ttt-cell" data-index="0"></div>
            <div class="ttt-cell" data-index="1"></div>
            <div class="ttt-cell" data-index="2"></div>
            <div class="ttt-cell" data-index="3"></div>
            <div class="ttt-cell" data-index="4"></div>
            <div class="ttt-cell" data-index="5"></div>
            <div class="ttt-cell" data-index="6"></div>
            <div class="ttt-cell" data-index="7"></div>
            <div class="ttt-cell" data-index="8"></div>
          </div>
          <div class="game-controls">
            <div class="custom-select" id="ttt-difficulty-container">
              <div class="select-trigger" onclick="toggleTTTDropdown()">
                <span id="ttt-difficulty-label">Easy</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </div>
              <div class="select-options" id="ttt-difficulty-options">
                <div class="select-option" onclick="changeTTTDifficulty('easy', 'Easy')">Easy</div>
                <div class="select-option" onclick="changeTTTDifficulty('medium', 'Medium')">Medium</div>
                <div class="select-option" onclick="changeTTTDifficulty('hard', 'Hard (Impossible)')">Hard (Impossible)
                </div>
              </div>
            </div>
            <button class="game-btn-small" onclick="resetTTT()">Restart</button>
          </div>
          <div class="game-status" id="ttt-status">Your turn (X)</div>
        </div>

        <!-- Snake -->
        <div id="game-snake" class="game-content">
          <canvas id="snake-canvas" width="300" height="300"></canvas>
          <div class="game-status" id="snake-score">Score: 0</div>
          <button class="game-btn" onclick="startSnake()">Start Game</button>
        </div>

        <!-- Chess -->
        <div id="game-chess" class="game-content">
          <div class="chess-board" id="chess-board">
            <!-- Board will be generated by JS -->
          </div>
          <div class="game-controls">
            <div class="custom-select" id="chess-difficulty-container">
              <div class="select-trigger" onclick="toggleChessDropdown()">
                <span id="chess-difficulty-label">Medium</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                  stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </div>
              <div class="select-options" id="chess-difficulty-options">
                <div class="select-option" onclick="changeChessDifficulty('easy', 'Easy')">Easy</div>
                <div class="select-option" onclick="changeChessDifficulty('medium', 'Medium')">Medium</div>
                <div class="select-option" onclick="changeChessDifficulty('hard', 'Hard')">Hard</div>
              </div>
            </div>
            <button class="game-btn-small" onclick="resetChess()">Restart</button>
          </div>
          <div class="game-status" id="chess-status">White's Turn</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Application Logic -->
  <script src="js/links.js"></script>
  <script src="js/music.js"></script>
  <script src="js/interactions.js"></script>
  <script src="js/games.js"></script>
  <script src="js/ui-effects.js"></script>
  <script src="js/transitions.js"></script>
  <script src="js/zen.js"></script>
  <script src="js/core.js"></script>

</body>

</html>
